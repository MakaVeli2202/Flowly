<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Gulf female avatar 1 – black hijab and abaya">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCE8E8"/>
      <stop offset="1" stop-color="#F5D5D5"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- Black abaya (body) -->
  <path d="M26 256 Q48 162 128 155 Q208 162 230 256Z" fill="#1E2028"/>
  <!-- Black hijab outer shape -->
  <ellipse cx="128" cy="104" rx="76" ry="83" fill="#1E2028"/>
  <!-- Hijab under-chin shadow -->
  <path d="M68 132 Q128 170 188 132 Q192 182 128 186 Q64 182 68 132Z" fill="#14161C"/>
  <!-- Subtle highlight on top of hijab -->
  <ellipse cx="112" cy="48" rx="28" ry="14" fill="#2E3040" opacity="0.5"/>
  <!-- Face (light olive skin) -->
  <ellipse cx="128" cy="94" rx="48" ry="53" fill="#DBBFA0"/>
  <!-- Eyebrows (prominent – face is framed by hijab) -->
  <path d="M97 75 C106 69 117 70 124 75" stroke="#1A0A00" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <path d="M132 75 C139 70 150 69 159 75" stroke="#1A0A00" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <!-- Eyes (larger, more expressive) -->
  <ellipse cx="111" cy="87" rx="9" ry="10" fill="#1A0A00"/>
  <ellipse cx="145" cy="87" rx="9" ry="10" fill="#1A0A00"/>
  <circle cx="114" cy="84.5" r="3" fill="white" opacity="0.5"/>
  <circle cx="148" cy="84.5" r="3" fill="white" opacity="0.5"/>
  <!-- Nose -->
  <path d="M122 103 Q128 115 134 103" stroke="#A88060" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M113 119 Q128 130 143 119" stroke="#8A5840" stroke-width="2.6" fill="none" stroke-linecap="round"/>
</svg>
