<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Expat female avatar 1 – dark hair casual">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDE8F8"/>
      <stop offset="1" stop-color="#DDD5F0"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- Pink top (body) -->
  <path d="M26 256 Q48 162 128 155 Q208 162 230 256Z" fill="#E8788A"/>
  <!-- Long dark hair (behind) -->
  <ellipse cx="128" cy="68" rx="56" ry="38" fill="#3A2010"/>
  <!-- Hair sides flowing down -->
  <rect x="64" y="75" width="22" height="88" rx="11" fill="#3A2010"/>
  <rect x="170" y="75" width="22" height="88" rx="11" fill="#3A2010"/>
  <!-- Neck -->
  <rect x="113" y="143" width="30" height="20" rx="5" fill="#D4A880"/>
  <!-- Face (medium warm skin) -->
  <ellipse cx="128" cy="96" rx="48" ry="53" fill="#E0B890"/>
  <!-- Hair top (overlaps face top) -->
  <ellipse cx="128" cy="54" rx="50" ry="24" fill="#3A2010"/>
  <!-- Eyebrows -->
  <path d="M100 79 C107 74 116 75 123 79" stroke="#2A1505" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M133 79 C140 75 149 74 156 79" stroke="#2A1505" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="112" cy="90" rx="8" ry="9" fill="#2C1500"/>
  <ellipse cx="144" cy="90" rx="8" ry="9" fill="#2C1500"/>
  <circle cx="114.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <circle cx="146.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <!-- Nose -->
  <path d="M122 105 Q128 117 134 105" stroke="#A87E50" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M112 121 Q128 132 144 121" stroke="#8A5038" stroke-width="2.6" fill="none" stroke-linecap="round"/>
</svg>
