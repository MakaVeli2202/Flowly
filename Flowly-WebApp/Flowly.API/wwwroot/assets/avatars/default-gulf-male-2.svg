  <ellipse cx="128" cy="96" rx="48" ry="53" fill="#D4AA7A"/>
  <!-- Eyebrows -->
  <path d="M100 79 C107 74 116 75 123 79" stroke="#2A1505" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <path d="M133 79 C140 75 149 74 156 79" stroke="#2A1505" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="112" cy="90" rx="8" ry="9" fill="#2C1500"/>
  <ellipse cx="144" cy="90" rx="8" ry="9" fill="#2C1500"/>
  <circle cx="114.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <circle cx="146.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <!-- Nose -->
  <path d="M122 105 Q128 117 134 105" stroke="#A88040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M112 121 Q128 132 144 121" stroke="#8A5A30" stroke-width="2.8" fill="none" stroke-linecap="round"/>
