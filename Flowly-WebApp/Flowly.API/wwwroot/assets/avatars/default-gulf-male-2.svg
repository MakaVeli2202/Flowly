<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Gulf male avatar 2 – kufiya without agal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8F0FB"/>
      <stop offset="1" stop-color="#D2E3F8"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- White thobe (body) -->
  <path d="M28 256 Q52 168 128 160 Q204 168 228 256Z" fill="#FAFAFA"/>
  <path d="M112 158 L118 172 L128 176 L138 172 L144 158 Q136 162 128 163 Q120 162 112 158Z" fill="#F0F0F0"/>
  <!-- Kufiya without agal (draped freely) -->
  <path d="M58 90 C54 46 84 24 128 24 C172 24 202 46 198 90 L196 185 C182 202 74 202 60 185Z" fill="#F8F8F8"/>
