  <path d="M60 90 C64 120 66 160 72 185" stroke="#E0E0E0" stroke-width="1.5" fill="none"/>
  <path d="M196 90 C192 120 190 160 184 185" stroke="#E0E0E0" stroke-width="1.5" fill="none"/>
  <!-- Rounded top (no agal) -->
  <ellipse cx="128" cy="38" rx="42" ry="22" fill="#FAFAFA"/>
  <!-- Neck -->
  <rect x="113" y="143" width="30" height="20" rx="5" fill="#D4AA7A"/>
