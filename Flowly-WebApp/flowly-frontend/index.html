<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Preconnect so font CSS + woff2 files arrive before first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- DNS prefetch fallback -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">

    <!-- Fonts loaded via <link> (not CSS @import) so the browser can
         parallelize the request with other assets — reduces font-swap CLS -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      media="all" />

    <link rel="icon" type="image/png" href="/GlanzLogo.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/GlanzLogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c8a96b" />
    <meta name="description" content="Professional mobile car detailing services in Qatar. Exterior, interior, ceramic coating and more — we come to you." />
    <meta property="og:type"       content="website" />
    <meta property="og:site_name"  content="Flowly" />
    <meta property="og:image"      content="/GlanzLogo.png" />
    <meta property="og:locale"     content="en_QA" />
    <!-- Preconnect for Stripe (used on booking page) -->
    <link rel="preconnect" href="https://js.stripe.com" />
    <!-- GA4 - replace G-XXXXXXXXXX with your Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    <title>Flowly — Professional Car Detailing in Qatar</title>
    <script>
      // Runtime API URL — resolve at request time, not build time.
      // 1. If __API_URL__ is already set (e.g. nginx sub_filter), use it.
      // 2. If VITE_API_BASE_URL env var was baked at build, import.meta will find it.
      // 3. Fall back to relative /api (Vite proxy in dev, nginx proxy in prod).
      window.__CONFIG__ = window.__CONFIG__ || {};
      // Only set in production — dev uses Vite proxy (/api).
      if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        window.__CONFIG__.API_URL = 'https://flowly-api.onrender.com/api';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
