  <path d="M132 75 C139 70 150 69 159 75" stroke="#2A1005" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="111" cy="87" rx="9" ry="10" fill="#2C1000"/>
  <ellipse cx="145" cy="87" rx="9" ry="10" fill="#2C1000"/>
  <circle cx="114" cy="84.5" r="3" fill="white" opacity="0.5"/>
  <circle cx="148" cy="84.5" r="3" fill="white" opacity="0.5"/>
  <!-- Nose -->
