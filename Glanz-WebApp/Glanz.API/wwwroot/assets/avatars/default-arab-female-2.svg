      <stop offset="0" stop-color="#FBE8DC"/>
      <stop offset="1" stop-color="#F5D5C0"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- Coral clothing body -->
  <path d="M26 256 Q48 162 128 155 Q208 162 230 256Z" fill="#E07040"/>
