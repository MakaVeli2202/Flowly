      <stop offset="0" stop-color="#E5ECF4"/>
      <stop offset="1" stop-color="#D5DFF0"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- Olive/khaki shirt (body) -->
  <path d="M28 256 Q52 168 128 160 Q204 168 228 256Z" fill="#7A8A5A"/>
  <path d="M108 160 L118 172 L128 176 L138 172 L148 160 Q136 165 128 166 Q120 165 108 160Z" fill="#6A7A4A"/>
  <!-- Short dark hair (tight) -->
  <ellipse cx="128" cy="58" rx="50" ry="28" fill="#201808"/>
  <!-- Tight sides -->
  <rect x="78" y="65" width="12" height="30" rx="6" fill="#201808"/>
  <rect x="166" y="65" width="12" height="30" rx="6" fill="#201808"/>
  <!-- Neck -->
  <rect x="113" y="143" width="30" height="20" rx="5" fill="#C8A068"/>
  <!-- Face (lighter olive skin) -->
  <ellipse cx="128" cy="96" rx="48" ry="53" fill="#D4A870"/>
  <!-- Short hair cap -->
  <ellipse cx="128" cy="52" rx="44" ry="20" fill="#201808"/>
  <!-- Eyebrows -->
  <path d="M100 79 C107 74 116 75 123 79" stroke="#1A0800" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <path d="M133 79 C140 75 149 74 156 79" stroke="#1A0800" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="112" cy="90" rx="8" ry="9" fill="#2C1500"/>
  <ellipse cx="144" cy="90" rx="8" ry="9" fill="#2C1500"/>
  <circle cx="114.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <circle cx="146.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <!-- Nose -->
  <path d="M122 105 Q128 117 134 105" stroke="#A07840" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mouth (friendly smile) -->
  <path d="M112 121 Q128 132 144 121" stroke="#7A4C20" stroke-width="2.8" fill="none" stroke-linecap="round"/>
