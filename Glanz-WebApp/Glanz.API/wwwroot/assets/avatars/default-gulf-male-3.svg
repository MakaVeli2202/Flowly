  <ellipse cx="112" cy="90" rx="8" ry="9" fill="#1C0800"/>
  <ellipse cx="144" cy="90" rx="8" ry="9" fill="#1C0800"/>
  <circle cx="114.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <circle cx="146.5" cy="87.5" r="2.8" fill="white" opacity="0.55"/>
  <!-- Nose -->
  <path d="M122 105 Q128 117 134 105" stroke="#8A5020" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M112 121 Q128 132 144 121" stroke="#6A3810" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Full beard -->
