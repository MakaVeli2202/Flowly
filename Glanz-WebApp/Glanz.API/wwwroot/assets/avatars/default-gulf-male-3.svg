      <stop offset="0" stop-color="#F5E6D0"/>
      <stop offset="1" stop-color="#EAD4B0"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- White thobe (body) -->
  <path d="M28 256 Q52 168 128 160 Q204 168 228 256Z" fill="#FAFAFA"/>
  <path d="M112 158 L118 172 L128 176 L138 172 L144 158 Q136 162 128 163 Q120 162 112 158Z" fill="#F0F0F0"/>
